<!DOCTYPE html>
<html>
<head>
    <title>Kindness Wall</title>
    <style>
        .note { background: #fff7ae; padding: 15px; margin: 10px; border-left: 5px solid #ffeb3b; width: 200px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        #wall { display: flex; flex-wrap: wrap; }
    </style>
</head>
<body>
    <h1>Kindness Wall 🌟</h1>
    <input type="text" id="noteInput" placeholder="Say something nice...">
    <button onclick="sendNote()">Post</button>
    <div id="wall"></div>

    <script>
        async function sendNote() {
            const content = document.getElementById('noteInput').value;
            await fetch('http://localhost:3001/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content })
            });
            location.reload();
        }

        async function loadNotes() {
            const res = await fetch('http://localhost:3001/notes');
            const data = await res.json();
            data.forEach(n => {
                const d = document.createElement('div');
                d.className = 'note';
                d.innerText = n.content;
                document.getElementById('wall').appendChild(d);
            });
        }
        loadNotes();
    </script>
</body>
</html>
