<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
    <title>Kindness Wall</title>
    <style>
      h1, .note {
    font-family: 'Indie Flower', cursive;
}
     body {
    background-image: url('background.jpg'); /* Keep your background here */
    background-size: cover;
    background-attachment: fixed;
    background-position: center;
    font-family: 'Segoe UI', sans-serif;
    
    /* This centers all the content (heading, input, and button) */
    text-align: center; 
    margin: 0;
    padding: 20px;
}

h1 {
    color: white;           /* Makes the text white */
    font-size: 3rem;        /* Makes the text bigger (adjust as needed) */
    margin-top: 50px;       /* Adds some space from the top of the page */
    text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5); /* Adds a shadow so it's readable on light backgrounds */
}

input, button {
    padding: 10px;
    font-size: 1rem;
    border-radius: 5px;
    border: none;
    margin: 10px;
}

#wall {
    display: flex; 
    flex-wrap: wrap; 
    justify-content: center; /* Centers the sticky notes in the middle */
    gap: 20px; 
    margin-top: 40px;
}

.note {
    background: #fff7ae;
    padding: 20px;
    width: 200px;
    min-height: 150px; /* Gives them a square shape */
    box-shadow: 5px 5px 10px rgba(0,0,0,0.2);
    
    /* This makes every second note tilt the opposite way */
    transform: rotate(-2deg); 
    transition: transform 0.3s ease; /* Smooth movement for later */
}

.note:nth-child(even) {
    transform: rotate(2deg);
}
.note:hover {
    transform: scale(1.1) rotate(0deg); /* Grows bigger and straightens */
    z-index: 10; /* Brings it to the front */
    box-shadow: 10px 10px 20px rgba(0,0,0,0.3);
    cursor: pointer;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.note {
    animation: fadeIn 0.5s ease-out forwards;
}
    </style>
</head>
<body>
    <h1>Kindness Wall 🌟</h1>
    <input type="text" id="noteInput" placeholder="Say something nice...">
    <button onclick="sendNote()">Post</button>
    <div id="wall"></div>

    <script>
        async function sendNote() {
            const content = document.getElementById('noteInput').value;
            await fetch('http://localhost:3001/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ content })
            });
            location.reload();
        }

        async function loadNotes() {
            const res = await fetch('http://localhost:3001/notes');
            const data = await res.json();
           data.forEach(n => {
    const d = document.createElement('div');
    d.className = 'note';
    d.innerText = n.content;

    // List of pastel colors
    const colors = ['#fff7ae', '#ffc1cc', '#b3e5fc', '#c8e6c9', '#e1bee7'];
    // Pick one randomly
    const randomColor = colors[Math.floor(Math.random() * colors.length)];
    d.style.backgroundColor = randomColor;

    document.getElementById('wall').appendChild(d);
});
        }
        loadNotes();
    </script>
</body>
</html>
